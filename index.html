<!DOCTYPE html>
<html>

<head>

    <title>Survey Form</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- Toaster Message -->
    <div id="toast"></div>

    <div class="container">

        <h2>Survey Form</h2>

        <form id="surveyForm">

            <input
            type="text"
            id="name"
            placeholder="Enter Name"
            required>

            <input
            type="email"
            id="email"
            placeholder="Enter Email"
            required>

            <input
            type="text"
            id="phone"
            placeholder="Enter Phone Number"
            required>

            <textarea
            id="message"
            placeholder="Enter Message">
            </textarea>

            <button type="submit">
                Submit
            </button>

        </form>

        <h3>Submitted Details</h3>

        <ul id="list"></ul>

    </div>

<script src="script.js"></script>

</body>

</html>
